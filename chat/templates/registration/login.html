{% extends 'base.html' %}

{% block title %}
  Login - RAG
{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-lg">
        <div class="card-header text-center">
          <h5 class="mb-0">
            <i class="fas fa-brain me-2"></i>Welcome Back
          </h5>
        </div>
        <div class="card-body">
          {% if form.errors %}
            <div class="alert alert-danger">
              <strong>Login failed!</strong> Please check your username and password.
            </div>
          {% endif %}

          <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
              <label for="id_username" class="form-label">Username</label>
              <input type="text" name="username" class="form-control" id="id_username" placeholder="Enter your username" required autofocus />
            </div>

            <div class="mb-3">
              <label for="id_password" class="form-label">Password</label>
              <input type="password" name="password" class="form-control" id="id_password" placeholder="Enter your password" required />
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>

          <hr class="my-4" />
          <div class="text-center">
            <p class="mb-0">
              Don't have an account?
              <a href="{% url 'register' %}" class="btn btn-outline-primary btn-sm">Register here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
