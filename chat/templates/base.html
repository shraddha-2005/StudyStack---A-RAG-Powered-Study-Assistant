<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RAG Teaching Assistant{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #e8f4fd 0%, #c8e6f9 50%, #dbeeff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .container {
            padding: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(26, 115, 232, 0.18);
            border: 1px solid #b3d4f0;
        }
        
        .card-header {
            background: linear-gradient(135deg, #1a73e8 0%, #4a9eff 100%);
            color: white;
            border-radius: 16px 16px 0 0 !important;
            padding: 22px;
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.2);
        }
        
        .card-body {
            padding: 32px;
            background: #ffffff;
            border-radius: 0 0 16px 16px;
        }
        
        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 2px solid #b3d4f0;
            background: #ffffff;
            color: #1a2b3c;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 0.2rem rgba(26, 115, 232, 0.2);
            background: #ffffff;
            color: #1a2b3c;
        }

        .form-control::placeholder {
            color: #6a8aa8;
        }
        
        .form-label {
            color: #1a2b3c;
            font-weight: 500;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1a73e8 0%, #4a9eff 100%);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
            color: #fff;
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.3);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #1558b0 0%, #1a73e8 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 115, 232, 0.4);
            color: #fff;
        }
        
        .btn-outline-primary {
            border: 2px solid #1a73e8;
            color: #1a73e8;
            font-weight: 600;
            transition: all 0.3s;
            border-radius: 8px;
        }
        
        .btn-outline-primary:hover {
            background: #1a73e8;
            color: white;
            transform: translateY(-1px);
        }

        .alert-danger {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-left: 3px solid #ef4444;
            color: #b91c1c;
            border-radius: 8px;
        }
        
        .text-danger {
            font-size: 0.875rem;
            margin-top: 5px;
            color: #dc2626 !important;
        }
        
        .form-text {
            color: #6a8aa8;
        }

        hr {
            border-color: #b3d4f0;
            opacity: 0.6;
        }

        p {
            color: #3a5a7c;
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
